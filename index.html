<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robert Lilly | Mechanical Engineering & Robotics Portfolio</title>
    <style>
        /* --- GLOBAL & BASE STYLES --- */
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f4f7fb;
            color: #111827;
        }
        a {
            text-decoration: none;
        }

        /* --- FIXED STICKY NAVBAR --- */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            box-shadow: 0 1px 18px rgba(15, 23, 42, 0.08);
        }
        .nav-name {
            font-size: 21px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }
        .nav-links a {
            color: #475569;
            font-weight: 600;
            font-size: 15px;
            transition: 0.2s ease;
        }
        .nav-links a:hover {
            color: #0284c7;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 82vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 55px 0 45px;
            color: white;
            background-image: linear-gradient(90deg, rgba(2, 6, 23, 0.92), rgba(2, 6, 23, 0.60)), 
                             url("https://unsplash.com");
            background-size: cover;
            background-position: center;
        }
        .hero-wrapper {
            width: 80%;
            max-width: 1350px;
            margin: 0 auto;
            background: rgba(10, 15, 30, 0.28);
            backdrop-filter: blur(4px);
            border-radius: 34px;
            padding: 70px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .hero-grid {
            display: grid;
            gap: 54px;
            grid-template-columns: 260px minmax(0, 1fr);
            align-items: center;
        }
        .eyebrow {
            color: #7dd3fc;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        h1 {
            font-size: clamp(48px, 7vw, 84px);
            line-height: 0.95;
            margin: 0 0 18px;
            letter-spacing: -0.06em;
        }
        .hero h2 {
            font-size: clamp(24px, 3vw, 34px);
            color: #e2e8f0;
            margin: 0 0 28px;
            font-weight: 500;
        }
        .hero p {
            max-width: 700px;
            font-size: 19px;
            line-height: 1.8;
            color: #cbd5e1;
        }

        /* --- INTERACTIVE PROFILE CARD --- */
        .profile-card {
            padding: 16px;
            border-radius: 24px;
            background: rgba(80, 80, 90, 0.32);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
            width: 260px;
            justify-self: start;
        }
        .profile-image {
            width: 100%;
            height: 255px;
            object-fit: cover;
            object-position: center top;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.30);
            display: block;
            margin: 0 auto 14px;
        }
        .profile-card p {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.7;
            margin: 0;
            text-align: center;
        }

        /* --- VISUAL HIERARCHY BUTTONS --- */
        .buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 34px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 999px;
            background: #38bdf8;
            color: #020617;
            font-weight: 800;
            transition: all 0.25s ease;
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.28);
        }
        .button:hover {
            transform: translateY(-3px);
            background: #7dd3fc;
        }
        .button.secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: none;
        }
        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .button.dark {
            background: #0f172a;
            color: white;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.16);
        }
        .button.dark:hover {
            background: #1e293b;
            color: white;
        }

        /* --- CORE PAGE SECTIONS --- */
        .section {
            width: 80%;
            max-width: 1350px;
            margin: 0 auto;
            padding: 100px 0;
        }
        .section-title {
            font-size: clamp(36px, 4vw, 50px);
            letter-spacing: -0.05em;
            margin: 0 0 18px;
        }
        .section-lead {
            max-width: 850px;
            font-size: 18px;
            line-height: 1.8;
            color: #475569;
            margin-bottom: 50px;
        }
        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 26px;
        }
        .panel, .card {
            background: white;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }
        .panel {
            padding: 38px;
        }
        .panel h3, .card h3 {
            margin-top: 0;
            color: #0f172a;
        }
        .panel p, .panel li, .card p {
            color: #475569;
            line-height: 1.8;
        }

        /* --- ENHANCED SKILLS SUBGRID --- */
        .skills-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .skills-category h3 {
            margin: 0 0 16px 0;
            font-size: 20px;
            color: #0f172a;
            border-left: 4px solid #38bdf8;
            padding-left: 12px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .skill {
            padding: 18px;
            border-radius: 18px;
            background: white;
            border: 1px solid #e2e8f0;
            font-weight: 800;
            color: #1e293b;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            text-align: center;
        }

        /* --- PROJECT CARDS --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 26px;
        }
        .card {
            overflow: hidden;
            transition: all 0.25s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 70px rgba(15, 23, 42, 0.14);
        }
        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
        }
        .card-content {
            padding: 28px;
        }
        .card-link {
            display: inline-block;
            margin-top: 18px;
            color: #0284c7;
            font-weight: 800;
        }

        /* --- EXPERIENCE & RESUME BOX --- */
        .resume-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            padding: 40px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ffffff, #eef6ff);
            border: 1px solid #dbeafe;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
        }
        .contact {
            text-align: center;
        }
        footer {
            padding: 40px 20px;
            text-align: center;
            background: white;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
        }

        /* --- SCROLL ANIMATIONS --- */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- RESPONSIVE TABLET STYLES --- */
        @media (max-width: 1100px) {
            .navbar {
                flex-direction: column;
                padding: 18px 6%;
                gap: 12px;
            }
            .nav-links {
                justify-content: center;
                gap: 16px;
            }
            .hero-wrapper, .section {
                width: 88%;
            }
            .hero-wrapper {
                padding: 50px;
            }
            .hero-grid {
                grid-template-columns: 1fr;
            }
            .profile-card {
                justify-self: center;
                width: 330px;
                max-width: 100%;
            }
